services:
  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    profiles: ["main"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TG_TOKEN: ${TG_TOKEN}
      MISTRAL_TOKEN: ${MISTRAL_TOKEN}
      MISTRAL_MODEL_NAME: ${MISTRAL_MODEL_NAME}
    volumes:
      - chroma_data:/app/chroma_db_folder
    command: ["python", "bot.py"]

  init_db:
    build: .
    profiles: ["init"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - chroma_data:/app/chroma_db_folder
    command: >
      sh -c "
      python init_db.py
      "

volumes:
  pgdata:
  chroma_data: